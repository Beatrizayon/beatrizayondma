<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Game code</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #0f172a;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --border: rgba(148, 163, 184, 0.35);
    }
    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 12px;
      box-sizing: border-box;
      gap: 10px;
    }
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      padding: 10px 12px;
    }
    .header .title {
      font-size: 14px;
      color: var(--text);
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .header .hint {
      font-size: 12px;
      color: var(--muted);
    }
    pre {
      margin: 0;
      flex: 1;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      padding: 12px;
      box-sizing: border-box;
      line-height: 1.5;
      font-size: 12.5px;
      white-space: pre;
      word-break: normal;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="title" id="title">Game code</div>
      <div class="hint">Read-only preview</div>
    </div>
    <pre id="code">Loading…</pre>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var file = params.get("file") || "";
      var title = document.getElementById("title");
      var codeEl = document.getElementById("code");

      if (file) title.textContent = "Code: " + file;
      if (!file) {
        codeEl.textContent = "No file specified.";
        return;
      }

      fetch(file)
        .then(function (res) {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.text();
        })
        .then(function (text) {
          codeEl.textContent = text;
        })
        .catch(function (err) {
          codeEl.textContent = "Could not load " + file + ": " + err.message;
        });
    })();
  </script>
</body>
</html>
